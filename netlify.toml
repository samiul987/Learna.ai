[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# IMPORTANT: Set GEMINI_API_KEY in Netlify Dashboard → Site Settings → Environment Variables
# The variable name must be: GEMINI_API_KEY
# Vite will automatically pick it up during the build via vite.config.ts

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
